{% extends "base.html" %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card">
                <div class="card-header">
                    <div class="logo mx-auto"><i class="bi bi-mortarboard"></i></div>
                    <h3 class="fw-bold">منصة مشاريع التخرج</h3>

                    {% if msg %}
                    <div class="alert alert-danger py-2 mt-2" style="font-size: 0.9rem;">{{ msg }}</div>
                    {% endif %}
                </div>

                <div class="card-body">
                    <ul class="nav nav-tabs justify-content-center mb-4" id="loginTab">
                        <li class="nav-item">
                            <button class="nav-link active fw-bold" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button">
                                تسجيل الدخول
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link fw-bold" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button">
                                إنشاء حساب
                            </button>
                        </li>
                    </ul>

                    <div class="tab-content" id="loginTabContent">
                        <!-- Login -->
                        <div class="tab-pane fade show active" id="login">
                            <form method="POST">
                                {% csrf_token %}
                                <div class="mb-3">
                                    <label class="form-label">البريد الإلكتروني</label>
                                    <input type="email" class="form-control" name="email" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">كلمة المرور</label>
                                    <input type="password" class="form-control" name="password" required>
                                </div>
                                <button type="submit" name="loginBtn" value="1" class="btn btn-primary w-100">دخول</button>
                                <p class="text-center mt-3">
                                    <a href="{% url 'LoginForAdmin' %}" class="text-decoration-none">تسجيل دخول مسؤول</a>
                                </p>
                            </form>
                        </div>

                        <!-- Register -->
                        <div class="tab-pane fade" id="register">
                            <form method="POST">
                                {% csrf_token %}

                                <div class="role-selection mb-4 d-flex justify-content-around">
                                    <div class="role-option text-center p-3 border rounded cursor-pointer active"
                                         onclick="selectRole('student')" style="width: 45%; cursor: pointer;">
                                        <i class="bi bi-mortarboard d-block"></i>
                                        <input type="radio" value="student" name="type" id="roleStudent" checked style="display: none;">
                                        <label>طالب</label>
                                    </div>

                                    <div class="role-option text-center p-3 border rounded cursor-pointer"
                                         onclick="selectRole('supervisor')" style="width: 45%; cursor: pointer;">
                                        <i class="bi bi-person-badge d-block"></i>
                                        <input type="radio" value="supervisor" name="type" id="roleSupervisor" style="display: none;">
                                        <label>مشرف</label>
                                    </div>
                                </div>

                                <div id="studentFields">
                                    <div class="mb-3"><label class="form-label">الاسم الكامل</label><input type="text" class="form-control" name="StudentFullName"></div>
                                    <div class="mb-3"><label class="form-label">رقم الطالب</label><input type="text" class="form-control" name="studentID"></div>

                                    <div class="mb-3">
                                        <label class="form-label">الجامعة</label>
                                        <select name="StudentUniversity" class="form-control">
                                            {% for unv in unvs %}
                                            <option value="{{ unv.id }}">{{ unv.univ_name }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">التخصص</label>
                                        <select name="StudentMajor" class="form-control">
                                            {% for mj in majors %}
                                            <option value="{{ mj.id }}">{{ mj.major_name }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">سنة التخرج</label>
                                        <input type="number" class="form-control" name="graduationYear">
                                    </div>
                                </div>

                                <div id="supervisorFields" style="display: none;">
                                    <div class="mb-3"><label class="form-label">الاسم الكامل</label><input type="text" class="form-control" name="supervisorName"></div>
                                    <div class="mb-3"><label class="form-label">المرتبة الأكاديمية</label><input type="text" class="form-control" name="supervisorPosotion"></div>

                                    <div class="mb-3">
                                        <label class="form-label">الجامعة</label>
                                        <select name="supervisorUniversity" class="form-control">
                                            {% for unv in unvs %}
                                            <option value="{{ unv.id }}">{{ unv.univ_name }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">القسم</label>
                                        <select name="supervisordepartment" class="form-control">
                                            {% for mj in majors %}
                                            <option value="{{ mj.id }}">{{ mj.major_name }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                </div>

                                <div class="mb-3"><label class="form-label">البريد الإلكتروني</label><input type="email" class="form-control" name="email" required></div>
                                <div class="mb-3"><label class="form-label">كلمة المرور</label><input type="password" class="form-control" name="password" required></div>
                                <div class="mb-3"><label class="form-label">تأكيد كلمة المرور</label><input type="password" class="form-control" name="rpassword" required></div>

                                <button type="submit" name="createAccount" value="1" class="btn btn-primary w-100">
                                    إنشاء الحساب
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    function selectRole(role) {
        document.getElementById('roleStudent').checked = (role === 'student');
        document.getElementById('roleSupervisor').checked = (role === 'supervisor');

        document.getElementById('studentFields').style.display = (role === 'student' ? 'block' : 'none');
        document.getElementById('supervisorFields').style.display = (role === 'supervisor' ? 'block' : 'none');
    }
</script>

<script src="{% static 'js/main.js' %}"></script>
{% endblock content %}
